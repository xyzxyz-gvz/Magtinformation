name: Update data from oda.ft.dk

# Runs once per day at 04:00 UTC (06:00 Danish time outside DST), and can
# be triggered manually from the Actions tab. The job pulls fresh data
# from Folketinget's open API, regenerates derived files, scrapes any
# missing portraits, and commits the result back to the repo.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

# Prevent overlapping runs (e.g. a manual run while the cron is still going)
concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # First run after deploy is a cold full fetch (~3-5h, ~1.8M Stemme
    # records alone). Subsequent runs are incremental and finish in <15min.
    # GitHub free tier caps jobs at 6h.
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Default GITHUB_TOKEN is fine — we only push to the same repo.
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      # 1a) Restore the previous run's raw JSON files from cache.
      #
      # Raw files (cases.json, stemmer.json, …) are gitignored because
      # they're huge (340MB+ for stemmer alone). They live in the GH
      # Actions cache between runs so incremental fetches have something
      # to merge new records into. First run finds an empty cache → the
      # SINCE step below detects missing raw files and forces full fetch.
      - name: Restore raw data cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            public/data/cases.json
            public/data/case_steps.json
            public/data/stemmer.json
            public/data/votes.json
            public/data/members.json
            public/data/actor_relations.json
            public/data/meetings.json
            public/data/agenda_items.json
            public/data/meeting_actors.json
            public/data/vote_case_actors.json
            public/data/topics.json
            public/data/emneord_sag.json
            public/data/periods.json
          key: raw-data-${{ github.run_id }}
          restore-keys: |
            raw-data-

      # 1b) Compute the --since date for an incremental fetch.
      #
      # Only go incremental if BOTH meta.json AND the big raw files exist
      # on disk — otherwise we'd merge new records into nothing and end
      # up with partial data. Missing files → empty SINCE → full fetch.
      - name: Compute incremental --since date
        id: since
        run: |
          SINCE=""
          if [ -f public/data/meta.json ] \
            && [ -f public/data/cases.json ] \
            && [ -f public/data/stemmer.json ] \
            && [ -f public/data/members.json ]; then
            SINCE=$(python3 - <<'PY'
          import json
          from datetime import datetime, timedelta
          try:
              meta = json.load(open("public/data/meta.json"))
              last = meta.get("updated_at")
              if last:
                  last = last.replace("Z", "+00:00")
                  dt = datetime.fromisoformat(last) - timedelta(days=2)
                  print(dt.strftime("%Y-%m-%d"))
          except Exception:
              pass
          PY
            )
          fi
          echo "value=$SINCE" >> "$GITHUB_OUTPUT"
          if [ -n "$SINCE" ]; then
            echo "Incremental fetch since $SINCE"
          else
            echo "No raw-data cache yet — falling back to full fetch"
          fi

      # 1c) Fetch raw data from oda.ft.dk. Incremental when --since is set;
      # the fetchers merge new/updated records into the existing JSON files
      # so historical data is preserved.
      - name: Fetch raw data
        id: fetch
        run: |
          if [ -n "${{ steps.since.outputs.value }}" ]; then
            python -m pipeline.fetch_all --since "${{ steps.since.outputs.value }}"
          else
            python -m pipeline.fetch_all
          fi
        continue-on-error: false

      # 2) Re-derive all the JSON files the site reads at runtime
      - name: Run preprocess
        id: preprocess
        run: python -m pipeline.preprocess

      # 2b) Save raw data cache only if both fetch AND preprocess succeeded.
      # A cancelled/failed run leaves the cache untouched so the next run
      # restores the last known-good snapshot (or falls back to full fetch).
      - name: Save raw data cache
        if: success() && steps.fetch.outcome == 'success' && steps.preprocess.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: |
            public/data/cases.json
            public/data/case_steps.json
            public/data/stemmer.json
            public/data/votes.json
            public/data/members.json
            public/data/actor_relations.json
            public/data/meetings.json
            public/data/agenda_items.json
            public/data/meeting_actors.json
            public/data/vote_case_actors.json
            public/data/topics.json
            public/data/emneord_sag.json
            public/data/periods.json
          key: raw-data-${{ github.run_id }}

      # 3) Pull any new MF photos via politikdata.dk's image proxy
      #    (idempotent — skips files that already exist).
      - name: Refresh portraits
        run: python -m pipeline.scrape_photos
        continue-on-error: true

      # 4) Show a summary in the Actions UI for quick auditing
      - name: Show data status
        run: |
          echo "## Data status" >> $GITHUB_STEP_SUMMARY
          ls -la public/data/*.json | head -30 >> $GITHUB_STEP_SUMMARY || true
          echo "Photo count: $(ls public/photos 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY

      # 5) Commit + push only if something actually changed.
      - name: Commit and push if changed
        run: |
          git config user.name "magtinformation-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data public/photos
          if git diff --cached --quiet; then
            echo "Ingen ændringer — springer commit over."
          else
            git commit -m "data: opdater fra oda.ft.dk ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
